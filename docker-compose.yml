services:
  db:
    image: postgres:15-alpine
    container_name: saa2025-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: saa2025
      POSTGRES_PASSWORD: saa2025
      POSTGRES_DB: saa2025
      POSTGRES_MULTIPLE_DATABASES: saa2025_test
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saa2025 -d saa2025"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
